process_name: sales-qualification
version: 1.0.0
description: >
  Qualify an inbound lead using BANT (Budget, Authority, Need, Timeline),
  enrich with firmographic data, score it, and route to the right SDR with
  a human gate before any outbound message is sent.
owner:
  name: Revenue Operations
  team: GTM
  contact: revops@example.com
trigger:
  type: webhook
  source: hubspot.form_submission
tags: [sales, lead, bant, revops]

inputs:
  - name: lead_email
    type: email
    required: true
    description: Primary contact email from the inbound form.
    example: jane.doe@acme.com
  - name: company_domain
    type: url
    required: true
    description: Company domain extracted from the email or form.
  - name: form_payload
    type: object
    required: true
    description: Raw HubSpot form submission fields.
  - name: utm
    type: object
    required: false
    description: Marketing attribution payload.

steps:
  - name: enrich_company
    type: tool
    tool: clearbit.company_enrich
    description: Look up firmographics (industry, employees, funding, tech stack) for the domain.
    timeout_ms: 15000
    retries: 2
    outputs: [company_profile]

  - name: enrich_person
    type: tool
    tool: apollo.person_enrich
    description: Pull the lead's seniority, role, LinkedIn URL, and tenure.
    timeout_ms: 15000
    retries: 2
    depends_on: [enrich_company]
    outputs: [person_profile]

  - name: bant_assessment
    type: llm
    model: claude-opus-4
    description: Run a BANT assessment grounded in the form answers + enriched profile.
    timeout_ms: 30000
    depends_on: [enrich_person]
    prompt: |
      You are a senior B2B sales qualifier. Given the lead profile, company profile,
      and the raw form submission below, produce a BANT assessment in strict JSON:
        { "budget": {"score": 0-5, "evidence": "..."},
          "authority": {"score": 0-5, "evidence": "..."},
          "need": {"score": 0-5, "evidence": "..."},
          "timeline": {"score": 0-5, "evidence": "..."},
          "overall": 0-20,
          "tier": "A" | "B" | "C" | "disqualify",
          "rationale": "1-3 sentences" }
      Be conservative: missing evidence means a lower score, not a guess.
    outputs: [bant_json]

  - name: route_decision
    type: decision
    description: Pick the routing lane from the BANT tier.
    depends_on: [bant_assessment]
    branches:
      tier == "A": book_meeting_draft
      tier == "B": nurture_sequence
      tier == "C": nurture_sequence
      tier == "disqualify": log_and_exit

  - name: book_meeting_draft
    type: llm
    model: claude-opus-4
    description: Draft a personalized outreach requesting a 20-minute discovery call.
    timeout_ms: 20000
    prompt: |
      Write a concise outbound email (<= 120 words) asking for a 20-minute
      discovery call. Reference one concrete detail from the company profile
      (recent funding, hiring signal, or tech-stack move). No emojis. No "hope
      you're doing well." End with two proposed times in the lead's timezone.
    outputs: [draft_email]

  - name: nurture_sequence
    type: agent
    agent: marketo.enroll_sequence
    description: Enroll tier B/C leads in the "education drip" nurture.
    timeout_ms: 10000

  - name: log_and_exit
    type: tool
    tool: crm.mark_disqualified
    description: Mark the lead disqualified with the rationale.
    timeout_ms: 5000

human_checkpoints:
  - after_step: bant_assessment
    prompt: >
      Sales Ops: review the BANT JSON. Override the tier if the model under- or
      over-scored. Approve to continue to routing.
    required: true
    expected_input: approval | tier_override
    sla_minutes: 60

  - after_step: book_meeting_draft
    prompt: >
      SDR: review the draft email. Edit freely. Send only after approval.
    required: true
    expected_input: approved_email_body
    sla_minutes: 240

outputs:
  - name: bant_json
    type: object
    description: Structured BANT assessment for CRM enrichment.
    sink: crm.lead.custom_fields
  - name: final_email
    type: string
    description: The human-approved outbound email (tier A only).
    sink: gmail.send
  - name: execution_trace
    type: object
    description: Step-by-step trace for the Revenue Ops dashboard.
    sink: snowflake.harness_runs

error_policy:
  retry: 2
  backoff: exponential
  on_failure: human_escalate
  fallback_agent: revops.oncall
